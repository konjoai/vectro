name: Wheels (cibuildwheel)

# v5.0.0 — replaces the hand-rolled per-target maturin matrix with
# cibuildwheel.  Builds the seven supported targets in a single matrix:
#   macOS arm64, macOS x86_64, Linux x86_64, Linux aarch64, Windows AMD64.
# On a v* tag, wheels + sdist are uploaded to PyPI via OIDC trusted
# publishing, and a GitHub Release is auto-created.

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build_wheels:
    name: ${{ matrix.os }} ${{ matrix.archs }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14          # Apple Silicon (M2)
            archs: arm64
          - os: macos-13          # Intel
            archs: x86_64
          - os: ubuntu-latest
            archs: x86_64
          - os: ubuntu-latest
            archs: aarch64        # via QEMU
          - os: windows-latest
            archs: AMD64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up QEMU (Linux aarch64 only)
        if: matrix.os == 'ubuntu-latest' && matrix.archs == 'aarch64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel==2.21.3

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS: ${{ matrix.archs }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.archs }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip build
          python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz

  upload_pypi:
    name: Upload to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
