name: Bench (cross-platform)

# v5.0.0 — weekly + on-demand cross-platform benchmark sweep.
# Runs the wave-N reproduce_paper harness on macOS-14 (Apple Silicon),
# macOS-13 (Intel), ubuntu-latest, windows-latest.  Uploads JSON
# results so `scripts/aggregate_paper_tables.py` can produce a single
# consolidated CSV / markdown table.

on:
  workflow_dispatch:
    inputs:
      wave:
        description: "Wave number (0, 1, 2, 3, 4 — passed through to reproduce_paper)."
        required: true
        default: "1"
        type: string
  schedule:
    # Mondays at 06:00 UTC — quiet enough that runner queues are short.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  bench:
    name: bench / ${{ matrix.os }} / wave-${{ inputs.wave || '1' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14         # Apple Silicon (M2)
            shell: bash
            label: darwin-arm64
          - os: macos-13         # Intel macOS
            shell: bash
            label: darwin-x86_64
          - os: ubuntu-latest
            shell: bash
            label: linux-x86_64
          - os: windows-latest
            shell: pwsh
            label: windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python deps
        run: python -m pip install --upgrade pip maturin numpy faiss-cpu hnswlib psutil

      - name: Build vectro_py (release)
        working-directory: rust/vectro_py
        run: maturin develop --release

      - name: Run benchmark — POSIX
        if: matrix.shell == 'bash'
        shell: bash
        run: |
          chmod +x ./reproduce_paper.sh
          ./reproduce_paper.sh \
            --platform ${{ matrix.label }} \
            --wave ${{ inputs.wave || '1' }} \
            --runs 3 \
            --output results/paper

      - name: Run benchmark — Windows
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          ./reproduce_paper.ps1 -Platform ${{ matrix.label }} -Wave ${{ inputs.wave || '1' }} -Runs 3 -Output results/paper

      - name: Upload bench artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bench-${{ matrix.label }}-wave-${{ inputs.wave || '1' }}
          path: results/paper/*.json

  aggregate:
    needs: bench
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - uses: actions/download-artifact@v4
        with:
          path: results/paper
          pattern: bench-*
          merge-multiple: true
      - run: python scripts/aggregate_paper_tables.py results/paper/*.json
      - uses: actions/upload-artifact@v4
        with:
          name: paper-tables
          path: |
            results/paper/aggregate.csv
            results/paper/aggregate.md
